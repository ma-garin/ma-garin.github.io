<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found | ma-garin</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f7f4;
        color: #222723;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.7;
      }

      main {
        width: min(560px, calc(100% - 32px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0 0 24px;
        color: #626b64;
      }

      a {
        color: #1f6f5b;
        font-weight: 700;
        text-underline-offset: 0.22em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ページが見つかりません</h1>
      <p>URLが変更されたか、ページが削除された可能性があります。</p>
      <a href="/">トップページへ戻る</a>
    </main>
  </body>
</html>
