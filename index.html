<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="ma-garinの個人用ポートフォリオサイトです。">
    <title>ma-garin | Portfolio</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --text: #222723;
        --muted: #626b64;
        --line: #d7ded5;
        --accent: #1f6f5b;
        --surface: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.7;
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 72px 0;
      }

      header {
        border-bottom: 1px solid var(--line);
        padding-bottom: 40px;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.88rem;
        font-weight: 700;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 8vw, 5.5rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .lead {
        max-width: 680px;
        margin: 24px 0 0;
        color: var(--muted);
        font-size: 1.1rem;
      }

      section {
        padding: 40px 0;
        border-bottom: 1px solid var(--line);
      }

      h2 {
        margin: 0 0 16px;
        font-size: 1.35rem;
      }

      p {
        margin: 0;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      a {
        color: var(--accent);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.22em;
      }

      .button {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 8px 14px;
        color: var(--text);
        font-weight: 650;
        text-decoration: none;
      }

      footer {
        padding-top: 28px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 24px, 920px);
          padding: 48px 0;
        }

        header {
          padding-bottom: 32px;
        }

        section {
          padding: 32px 0;
        }

        .links {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Portfolio</p>
        <h1>ma-garin</h1>
        <p class="lead">
          個人の制作物、学習記録、公開プロジェクトをまとめるためのポートフォリオサイトです。
        </p>
      </header>

      <section aria-labelledby="about-heading">
        <h2 id="about-heading">About</h2>
        <p>
          このページは GitHub Pages で公開しています。プロフィールや実績は、内容が固まり次第ここに追加していきます。
        </p>
      </section>

      <section aria-labelledby="works-heading">
        <h2 id="works-heading">Works</h2>
        <p>
          公開できる制作物やリポジトリへのリンクを順次掲載します。
        </p>
        <div class="links" aria-label="関連リンク">
          <a class="button" href="https://github.com/ma-garin">GitHub</a>
        </div>
      </section>

      <footer>
        <p>&copy; ma-garin</p>
      </footer>
    </main>
  </body>
</html>
